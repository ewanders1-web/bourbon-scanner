<style>
:root{--bg:#080502;--bg3:#160d05;--bg4:#1e1208;--gold:#c9943a;--gold2:#7a501a;--gold3:#3d2508;--goldb:#f0c060;--text:#e8d4a8;--text2:#9e7c40;--text3:#4e3515;--legit:#1fc55a;--sourced:#e84444;--mixed:#e8960a;--radius:12px;--tab-h:60px;--safe-b:env(safe-area-inset-bottom,0px)}

.vicon{font-size:30px;flex-shrink:0}
.vlbl{font-size:11px;font-weight:700;letter-spacing:.1em;margin-bottom:3px}.vlbl.buy{color:var(--legit)}.vlbl.skip{color:var(--sourced)}.vlbl.caution{color:var(--mixed)}

.alts{margin-top:12px}.atitle{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--gold3)}
.acard{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--gold3);border-radius:8px;padding:9px 12px;margin-bottom:6px;cursor:pointer}.acard:hover{border-color:var(--gold)}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:"Playfair Display",serif;font-size:18px;color:var(--goldb)}
.sec-count{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--gold3);border-radius:20px;padding:2px 10px}
.empty{text-align:center;padding:40px 16px;color:var(--text3)}.empty .ei{font-size:40px;margin-bottom:10px}
.apanel{background:var(--bg3);border:1px solid var(--gold3);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.apanel h3{color:var(--goldb);margin-bottom:12px;font-family:"Playfair Display",serif}
.apanel input,.apanel select,.apanel textarea{width:100%;padding:9px 12px;margin-bottom:9px;background:var(--bg);color:var(--text);border:1px solid var(--gold3);border-radius:8px;font-size:13px;outline:none;font-family:"DM Sans",sans-serif}
.apanel input:focus,.apanel select:focus,.apanel textarea:focus{border-color:var(--gold)}.apanel input::placeholder,.apanel textarea::placeholder{color:var(--text3)}
.apanel textarea{resize:vertical;min-height:60px}
.savebtn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080502;padding:12px;border:none;border-radius:30px;font-weight:700;font-size:13px;width:100%;cursor:pointer}
.elist-item{background:var(--bg);border:1px solid var(--gold3);border-radius:8px;padding:9px 12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--bg3);border-radius:20px 20px 0 0;border:1px solid var(--gold3);border-bottom:none;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:20px 18px calc(20px + var(--safe-b));animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--gold3);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:"Playfair Display",serif;font-size:20px;color:var(--goldb);text-align:center;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:14px}
.modal-tabs{display:flex;border-bottom:1px solid var(--gold3);margin-bottom:14px}
.modal-tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.modal-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.modal-section{display:none}.modal-section.active{display:block}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(201,148,58,.08);font-size:13px}
.detail-label{color:var(--text3)}.detail-val{color:var(--text);font-weight:600;text-align:right;max-width:60%}
.price-row{display:flex;gap:8px;margin:10px 0}
.price-box{flex:1;background:var(--bg4);border:1px solid var(--gold3);border-radius:8px;padding:10px;text-align:center}
.price-lbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.price-val{font-size:16px;font-weight:700;color:var(--goldb)}
.rating-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rating-bar-label{font-size:11px;color:var(--text2);width:90px;flex-shrink:0}
.rating-bar-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.rating-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--goldb));border-radius:3px;transition:width .5s}
.rating-big{text-align:center;padding:14px 0}
.rating-number{font-size:40px;font-weight:700;color:var(--goldb);font-family:"Playfair Display",serif}
.rating-count{font-size:11px;color:var(--text3)}
.review-card{background:var(--bg4);border:1px solid var(--gold3);border-radius:10px;padding:12px;margin-bottom:10px}
.review-header{display:flex;justify-content:space-between;margin-bottom:6px}
.review-author{font-size:12px;font-weight:600;color:var(--goldb)}
.review-date{font-size:10px;color:var(--text3)}
.review-text{font-size:12px;color:var(--text2);line-height:1.5}
.star-input{display:flex;gap:6px;margin-bottom:10px}
.star-btn{font-size:24px;cursor:pointer;opacity:.4;transition:opacity .15s,transform .15s}
.star-btn.on{opacity:1}
.star-btn:hover{transform:scale(1.15)}
.stats-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.stat-card{background:var(--bg3);border:1px solid var(--gold3);border-radius:10px;padding:10px 14px;text-align:center;flex-shrink:0;min-width:72px}
.stat-num{font-size:20px;font-weight:700;color:var(--goldb);font-family:"Playfair Display",serif}
.stat-lbl{font-size:9px;color:var(--text3);letter-spacing:.05em;margin-top:2px}
.size-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.size-chip{padding:4px 10px;border-radius:20px;border:1px solid var(--gold3);font-size:11px;color:var(--text2);background:var(--gold3);color:var(--goldb);border-color:var(--gold)}
.rare-badge{background:linear-gradient(135deg,rgba(201,148,58,.3),rgba(240,192,96,.15));border:1px solid var(--gold);color:var(--goldb);font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
</style>

<body>

<div id="main"></div>
<div id="tabs">
  <div class="tab active" id="t0" onclick="go(0)"><div class="ticon">&#x1F4CB;</div><div>DATABASE</div></div>
  <div class="tab" id="t1" onclick="go(1)"><div class="ticon">&#x1F4F7;</div><div>SCAN</div></div>
  <div class="tab" id="t2" onclick="go(2)"><div class="ticon">&#x1F943;</div><div>COLLECTION</div></div>
  <div class="tab" id="t3" onclick="go(3)"><div class="ticon">&#x2B50;</div><div>WANT LIST</div></div>
  <div class="tab" id="t4" onclick="go(4)"><div class="ticon">+</div><div>ADMIN</div></div>
</div>
<script>
var FB_CFG={apiKey:"AIzaSyAVvQOA2f0EExyhsQcSboT4TBovEzAqVYc",authDomain:"bourbon-scanner.firebaseapp.com",databaseURL:"https://bourbon-scanner-default-rtdb.firebaseio.com",projectId:"bourbon-scanner",storageBucket:"bourbon-scanner.firebasestorage.app",messagingSenderId:"162552372589",appId:"1:162552372589:web:ddacaff140a6359ceb4e64"};
firebase.initializeApp(FB_CFG);
var db=firebase.database();
var CT=0,CF="all",OC=null,SR=false,LS=null;
var BD={},COL={},WANT={},REVIEWS={};
var MODAL_UPC=null,MODAL_STAR=0;

db.ref("bourbons").on("value",function(s){BD=s.val()||{};if(CT===0)rDB();});
db.ref("collection").on("value",function(s){COL=s.val()||{};if(CT===2)rCOL();else if(CT===0){var si=document.getElementById("si");rCL(si?si.value:"");}updateBadges();});
db.ref("watchlist").on("value",function(s){WANT=s.val()||{};if(CT===3)rWANT();else if(CT===0){var si=document.getElementById("si");rCL(si?si.value:"");}updateBadges();});
db.ref("reviews").on("value",function(s){REVIEWS=s.val()||{};});

function go(i){
  CT=i;
  for(var j=0;j<5;j++){var t=document.getElementById("t"+j);if(t)t.classList.toggle("active",j===i);}
  if(SR&&i!==1)stopScan();
  if(i===0)rDB();else if(i===1)rSCAN();else if(i===2)rCOL();else if(i===3)rWANT();else rADMIN();
}
function updateBadges(){
  var c2=document.getElementById("t2"),c3=document.getElementById("t3");
  var cn=Object.keys(COL).length,wn=Object.keys(WANT).length;
  if(c2){var l2=c2.querySelector("div:last-child");if(l2)l2.textContent=cn>0?"COLLECTION ("+cn+")":"COLLECTION";}
  if(c3){var l3=c3.querySelector("div:last-child");if(l3)l3.textContent=wn>0?"WANT LIST ("+wn+")":"WANT LIST";}
}
function getAvgRating(upc){
  var rv=REVIEWS[upc];if(!rv)return null;
  var vals=Object.values(rv).map(function(r){return r.stars||0;}).filter(function(s){return s>0;});
  if(!vals.length)return null;
  return (vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1);
}
function starsHtml(rating,size){
  var r=parseFloat(rating)||0,s="";
  for(var i=1;i<=5;i++){s+=i<=Math.round(r)?"&#9733;":"&#9734;";}
  return "<span style='color:var(--gold);font-size:"+(size||12)+"px;letter-spacing:1px'>"+s+"</span>";
}
function rDB(){
  var m=document.getElementById("main");if(!m)return;
  var q="";var si=document.getElementById("si");if(si)q=si.value;
  m.innerHTML="";
  var sr=document.createElement("div");sr.className="srow";
  var inp=document.createElement("input");
  inp.className="sinput";inp.id="si";inp.type="text";
  inp.autocomplete="off";inp.autocorrect="off";inp.autocapitalize="off";inp.spellcheck=false;
  inp.placeholder="Search bourbons...";inp.value=q;
  var scanBtn=document.createElement("button");
  scanBtn.className="scanbtn-sm";scanBtn.textContent="Scan";
  scanBtn.onclick=function(){go(1);};
  sr.appendChild(inp);sr.appendChild(scanBtn);
  var fr=document.createElement("div");fr.className="frow";fr.id="fr";
  var cl=document.createElement("div");cl.id="cl";
  m.appendChild(sr);m.appendChild(fr);m.appendChild(cl);
  rFR();rCL(q);
  inp.addEventListener("input",function(){rCL(this.value);});
  if(q)inp.focus();
}
function rFR(){
  var fr=document.getElementById("fr");if(!fr)return;fr.innerHTML="";
  ["all","Legit","Sourced","Mixed"].forEach(function(f){
    var b=document.createElement("button");b.className="fb"+(CF===f?" on":"");
    b.textContent=f==="all"?"All":f;
    b.onclick=function(){CF=f;rFR();var si=document.getElementById("si");rCL(si?si.value:"");};
    fr.appendChild(b);
  });
}
function rCL(q){
  var cl=document.getElementById("cl");if(!cl)return;cl.innerHTML="";
  var qL=(q||"").toLowerCase().trim();
  var items=Object.entries(BD).filter(function(e){
    var b=e[1];
    return (CF==="all"||b.status===CF)&&(!qL||b.name.toLowerCase().indexOf(qL)>=0||(b.distiller||"").toLowerCase().indexOf(qL)>=0||e[0].indexOf(qL)>=0);
  });
  if(items.length===0){
    var es=document.createElement("div");es.className="empty";
    es.innerHTML="<div class='ei'>&#x1F943;</div><div>No bourbons found</div>";
    cl.appendChild(es);return;
  }
  items.forEach(function(e){cl.appendChild(mkCard(e[0],e[1],"db"));});
}
function mkCard(upc,b,ctx){
  var sc=b.status==="Legit"?"l":b.status==="Sourced"?"s":"m";
  var ic=b.status==="Legit"?"&#x2705;":b.status==="Sourced"?"&#x1F534;":"&#x1F7E1;";
  var inCol=COL.hasOwnProperty(upc),inWant=WANT.hasOwnProperty(upc);
  var avg=getAvgRating(upc);
  var card=document.createElement("div");card.className="card";
  var ch=document.createElement("div");ch.className="ch";
  var badge=document.createElement("div");badge.className="cbadge b"+sc;badge.innerHTML=ic;
  var ci=document.createElement("div");ci.className="ci";
  var cn=document.createElement("div");cn.className="cname";cn.textContent=b.name||"Unknown";
  var cd=document.createElement("div");cd.className="cdist";
  cd.textContent=(b.distiller||"Unknown")+(b.proof?" \u00b7 "+b.proof+"\u00b0":"")+(b.age?" \u00b7 "+b.age+" yr":"");
  ci.appendChild(cn);ci.appendChild(cd);
  if(avg){var rs=document.createElement("div");rs.innerHTML=starsHtml(avg,11)+" <span style='font-size:10px;color:var(--text3)'>("+avg+")</span>";ci.appendChild(rs);}
  var pill=document.createElement("span");pill.className="pill p"+sc;pill.textContent=b.status.toUpperCase();
  ch.appendChild(badge);ch.appendChild(ci);ch.appendChild(pill);
  var cb=document.createElement("div");cb.className="cb"+(OC===upc?" open":"");
  var notesEl=document.createElement("div");notesEl.className="cnotes";notesEl.textContent=b.notes||"No additional notes.";
  var metaDiv=document.createElement("div");metaDiv.className="cmeta";
  if(b.proof){var pt=document.createElement("div");pt.className="cmeta-tag";pt.innerHTML="Proof <span>"+b.proof+"&#x00B0;</span>";metaDiv.appendChild(pt);}
  if(b.age){var at2=document.createElement("div");at2.className="cmeta-tag";at2.innerHTML="Age <span>"+b.age+" yr</span>";metaDiv.appendChild(at2);}
  if(b.msrp){var mt2=document.createElement("div");mt2.className="cmeta-tag";mt2.innerHTML="MSRP <span>$"+b.msrp+"</span>";metaDiv.appendChild(mt2);}
  if(b.type){var tt=document.createElement("div");tt.className="cmeta-tag";tt.innerHTML="<span>"+b.type+"</span>";metaDiv.appendChild(tt);}
  if(b.rare){var rt=document.createElement("div");rt.className="rare-badge";rt.innerHTML="&#x1F525; Rare";metaDiv.appendChild(rt);}
  var upcEl=document.createElement("div");upcEl.style.cssText="margin-top:6px;font-size:11px;color:var(--text3)";upcEl.textContent="UPC: "+upc;
  var acts=document.createElement("div");acts.className="cactions";

      actDiv.appendChild(colBtn);actDiv.appendChild(wantBtn);actDiv.appendChild(detBtn2);rbox.appendChild(actDiv);
      var scanAgain=document.createElement("div");scanAgain.style.cssText="text-align:center;margin-top:14px;";
      var sa=document.createElement("button");sa.className="sbtn";sa.style.cssText="padding:9px 24px;";sa.textContent="Scan Another";sa.onclick=function(){toggleScan();};
      scanAgain.appendChild(sa);rbox.appendChild(scanAgain);rd.appendChild(rbox);
    } else {
      var rbox2=document.createElement("div");rbox2.className="rbox";
      var h3b=document.createElement("h3");h3b.textContent="Not in Database";rbox2.appendChild(h3b);
      var p2=document.createElement("p");p2.style.cssText="color:var(--text2);font-size:12px;margin-bottom:10px;";p2.textContent="UPC "+code+" not found. Want to add it?";rbox2.appendChild(p2);
      var addBtn=document.createElement("button");addBtn.className="sbtn";addBtn.style.cssText="padding:9px 22px;display:block;margin:0 auto 8px;";addBtn.textContent="Add This Bourbon";
      addBtn.onclick=function(){openAdmin(code);};rbox2.appendChild(addBtn);
      var againBtn=document.createElement("button");againBtn.className="sbtn";againBtn.style.cssText="padding:9px 22px;background:transparent;color:var(--text2);border:1px solid var(--gold3);display:block;margin:0 auto;";againBtn.textContent="Scan Again";
      againBtn.onclick=function(){toggleScan();};rbox2.appendChild(againBtn);rd.appendChild(rbox2);
    }
  }).catch(function(err){
    var rd2=document.getElementById("sres");
    if(rd2){rd2.innerHTML="";var eb=document.createElement("div");eb.className="rbox";eb.innerHTML="<p style='color:var(--sourced)'>Error: "+err.message+"</p>";rd2.appendChild(eb);}
  });
}
function openAdmin(code){go(4);setTimeout(function(){var f=document.getElementById("nU");if(f){f.value=code||"";f.focus();}},150);}
function rADMIN(){
  var m=document.getElementById("main");if(!m)return;m.innerHTML="";
  var p=document.createElement("div");p.className="apanel";
  p.innerHTML="<h3>Add New Bourbon</h3>"
    +"<input type='text' id='nU' placeholder='Barcode / UPC' autocomplete='off'>"
    +"<input type='text' id='nN' placeholder='Bourbon Name' autocomplete='off'>"
    +"<select id='nST'><option value='Legit'>Legit (Distilled on-site)</option><option value='Sourced'>Sourced (MGP / Other)</option><option value='Mixed'>Mixed / Unknown</option></select>"
    +"<input type='text' id='nD' placeholder='Actual Distiller' autocomplete='off'>"
    +"<input type='text' id='nTP' placeholder='Type (e.g. Bourbon Whiskey)' autocomplete='off'>"
    +"<input type='text' id='nPF' placeholder='Proof (e.g. 90)' autocomplete='off'>"
    +"<input type='text' id='nAG' placeholder='Age Statement (years)' autocomplete='off'>"
    +"<input type='text' id='nMS' placeholder='MSRP ($)' autocomplete='off'>"
    +"<input type='text' id='nSC' placeholder='Secondary Market Price ($)' autocomplete='off'>"
    +"<input type='text' id='nSZ' placeholder='Sizes (e.g. 750 mL, 1 L)' autocomplete='off'>"
    +"<label style='display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:13px;color:var(--text2);cursor:pointer'><input type='checkbox' id='nRR' style='width:auto;margin:0'> Mark as Rare/Limited</label>"
    +"<textarea id='nNotes' placeholder='Notes (optional)'></textarea>"
    +"<button class='savebtn' onclick='saveToDB()'>SAVE TO CLOUD</button>";
  var al=document.createElement("div");al.id="al";
  m.appendChild(p);m.appendChild(al);rAL();
}
function rAL(){
  var al=document.getElementById("al");if(!al)return;al.innerHTML="";
  var es=Object.entries(BD);if(es.length===0)return;
  var h2=document.createElement("div");h2.style.cssText="color:var(--text2);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;";
  h2.textContent="Existing Entries ("+es.length+")";al.appendChild(h2);
  es.forEach(function(e){
    var upc=e[0],b=e[1];
    var sc=b.status==="Legit"?"l":b.status==="Sourced"?"s":"m";
    var row=document.createElement("div");row.className="elist-item";
    var info=document.createElement("div");
    var nm=document.createElement("div");nm.style.cssText="font-size:13px;font-weight:600;color:var(--text);";nm.textContent=b.name;
    var upci=document.createElement("div");upci.style.cssText="font-size:10px;color:var(--text3);margin-top:2px;";
    var sp=document.createElement("span");sp.className="pill p"+sc;sp.style.cssText="font-size:8px;padding:1px 6px;";sp.textContent=b.status;
    var meta=document.createElement("span");meta.style.cssText="font-size:9px;color:var(--text3);margin-left:4px;";
    meta.textContent=(b.proof?b.proof+"\u00B0 ":"")+(b.age?b.age+"yr ":"")+(b.msrp?"$"+b.msrp:"");
    upci.textContent=upc+" ";upci.appendChild(sp);upci.appendChild(meta);
    info.appendChild(nm);info.appendChild(upci);
    var del=document.createElement("button");del.className="edel";del.textContent="Del";
    del.dataset.upc=upc;del.onclick=function(){delEntry(this.dataset.upc);};
    row.appendChild(info);row.appendChild(del);al.appendChild(row);
  });
}
function saveToDB(){
  var upc=(document.getElementById("nU")||{}).value||"";upc=upc.trim();
  var name=(document.getElementById("nN")||{}).value||"";name=name.trim();
  var status=(document.getElementById("nST")||{}).value||"Legit";
  var dist=((document.getElementById("nD")||{}).value||"").trim();
  var type=((document.getElementById("nTP")||{}).value||"").trim();
  var proof=((document.getElementById("nPF")||{}).value||"").trim();
  var age=((document.getElementById("nAG")||{}).value||"").trim();
  var msrp=((document.getElementById("nMS")||{}).value||"").trim();
  var secondary=((document.getElementById("nSC")||{}).value||"").trim();
  var sizes=((document.getElementById("nSZ")||{}).value||"").trim();
  var rare=(document.getElementById("nRR")||{}).checked||false;
  var notes=((document.getElementById("nNotes")||{}).value||"").trim();
  if(!upc||!name){alert("UPC and Name are required.");return;}
  var data={name:name,status:status,distiller:dist,notes:notes,timestamp:Date.now()};
  if(type)data.type=type;if(proof)data.proof=proof;if(age)data.age=age;
  if(msrp)data.msrp=msrp;if(secondary)data.secondary=secondary;
  if(sizes)data.sizes=sizes;if(rare)data.rare=true;
  db.ref("bourbons/"+upc).set(data)
    .then(function(){
      alert("Saved!");
      ["nU","nN","nD","nTP","nPF","nAG","nMS","nSC","nSZ","nNotes"].forEach(function(id){var f=document.getElementById(id);if(f)f.value="";});
      var r=document.getElementById("nRR");if(r)r.checked=false;rAL();
    }).catch(function(e){alert("Error: "+e.message);});
}
function delEntry(upc){
  var nm=BD[upc]&&BD[upc].name?BD[upc].name:upc;
  if(!confirm("Delete "+nm+"?"))return;
  db.ref("bourbons/"+upc).remove().then(function(){rAL();});
}
window.onload=function(){go(0);};
</script>
</body>
</html>
